<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>Standard Playbook — Offline</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom)); background: #0a0a0b; color: #f4f2ee; }
      main { width: min(100%, 420px); }
      img { width: 72px; height: 72px; border-radius: 16px; }
      p { margin: 24px 0 0; color: #aaa8a4; font-size: 16px; line-height: 1.5; }
      h1 { margin: 28px 0 0; max-width: 340px; font-size: clamp(42px, 13vw, 68px); line-height: .92; letter-spacing: -.04em; text-transform: uppercase; }
      button { margin-top: 32px; min-height: 48px; border: 1px solid #f4f2ee; border-radius: 0; padding: 0 22px; background: #f4f2ee; color: #0a0a0b; font: 700 12px/1 -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: .12em; text-transform: uppercase; }
      button:active { transform: scale(.98); }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>You’re offline.</h1>
      <p>Reconnect to keep working in Standard Playbook. Your account and saved work are still waiting for you.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
